name: build-and-deploy
on: 
  push:
    branches:
      - master

  schedule:
    - cron: '0 12 * * 3,6' # run on every WED, SAT

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v2.3.1

      - name: Install and Build 🔧 # This example project is built using npm and outputs the result to the 'build' folder. Replace with the commands required to build your project, or remove this step entirely if your site is pre-built.
        run: pip install -r requirements.txt
      

      - name: Crawling
        run: python3 src/main.py

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@4.1.5
        with:
          branch: data # The branch the action should deploy to.
          folder: data # The folder the action should deploy.

      - name: Upload
#        env: 
#          db_password: ${{ secrets.DATABASE_PASSWORD }}
        run: |
          sudo systemctl start mysql
          mysql --local-infile=1 -u admin -h database.cmahwbtfb8se.us-east-1.rds.amazonaws.com -p'l&!bsH7rXV'
          exit
          mysql app --local-infile=1 --execute "DELETE FROM COURSE" -u admin -h database.cmahwbtfb8se.us-east-1.rds.amazonaws.com -p'l&!bsH7rXV'
          DIR=$"./data"
          files=($(find $DIR -name "*.csv"))
          len=${#files[@]}
          for (( i=0; i<$len; i++ )); 
          do  
            mysql app --local-infile=1 --execute "LOAD DATA LOCAL INFILE '${files[$i]}' 
            INTO TABLE COURSE FIELDS TERMINATED BY ',' 
            ENCLOSED BY '\"' LINES 
            TERMINATED BY '\n' 
            IGNORE 1 ROWS" 
            -u admin -h database.cmahwbtfb8se.us-east-1.rds.amazonaws.com -p'l&!bsH7rXV' -P 3306; 
          done
